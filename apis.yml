name: Amazon Kinesis Data Firehose
description: >-
  Amazon Kinesis Data Firehose is the easiest way to reliably load streaming data into data lakes, data stores, and
  analytics services. It can capture, transform, and deliver streaming data to Amazon S3, Amazon Redshift, Amazon
  OpenSearch Service, Splunk, and any custom HTTP endpoint. It is a fully managed service that automatically scales to
  match the throughput of your data and requires no ongoing administration.
