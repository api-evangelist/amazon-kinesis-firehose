url: https://aws.amazon.com/kinesis/data-firehose/
created: '2024-01-15'
modified: '2026-03-16'
apis:
  - name: Amazon Kinesis Data Firehose API
    description: >-
      The Amazon Kinesis Data Firehose API provides the easiest way to reliably
      load streaming data into data lakes, data stores, and analytics services. The
      API allows you to create and manage delivery streams, configure data
      transformations using AWS Lambda, set up destinations such as Amazon S3,
      Amazon Redshift, Amazon OpenSearch Service, and custom HTTP endpoints, and
      put records into delivery streams. It automatically scales to match your data
      throughput with no ongoing administration required.
